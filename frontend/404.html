<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle infinite alternate; }
    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }
  </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-center relative">

  <script>
    for(let i=0; i<50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = Math.random() * 3 + 'px';
      star.style.height = star.style.width;
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (Math.random() * 2 + 1) + 's';
      document.body.appendChild(star);
    }
  </script>

  <div class="relative z-10 text-center px-4">
    <div class="mb-8 relative inline-block">
      <div class="absolute inset-0 bg-violet-600 blur-[80px] opacity-40 rounded-full"></div>
      <h1 class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-600">404</h1>
    </div>

    <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Lost in Space?</h2>
    <p class="text-gray-400 text-lg max-w-md mx-auto mb-8">
      The page you are looking for doesn't exist or has been moved to another galaxy.
    </p>

    <!-- <a href="/" class="inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-500 text-white px-8 py-3 rounded-full font-bold transition-all hover:scale-105 shadow-[0_0_20px_rgba(139,92,246,0.5)]">
      <i data-lucide="home" class="w-5 h-5"></i> Back Home
    </a> -->
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
