<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/signup/signup.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
    /* ============================ */
    /* TOAST STYLES (Inlined)       */
    /* ============================ */
    #toast-container {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10000; display: flex; flex-direction: column-reverse; align-items: center; gap: 14px; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 12px; padding: 16px 24px; border-radius: 50px;
      background: rgba(20, 20, 35, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15);
      color: white; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6); font-family: 'Poppins', sans-serif; font-size: 14px;
      pointer-events: auto; opacity: 0; transform: translateY(20px) scale(0.9);
      animation: pop-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .toast.success { border-bottom: 3px solid #10b981; }
    .toast.error { border-bottom: 3px solid #ef4444; }
    
    @keyframes pop-up { 
      0% { opacity: 0; transform: translateY(20px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
</style>
</head>

<body>

  <img src="../assets/blob.svg" class="blob">
  <div class="orbit"></div>

  <div class="login">
    <a href="/">
      <img src="../assets/new-logo.png" class="logo"/>
    </a>

    <div id="signupSection">
        <h2>Create Account</h2>
        <h3>Register to continue</h3>

        <div class="role-select">
        <button type="button" id="userMode" class="role-btn active">Register as User</button>
        <button type="button" id="adminMode" class="role-btn">Register as Organizer</button>
        </div>

        <form class="form">
        <div class="textbox">
            <input type="text" id="fullname" required>
            <label>Full Name (as per ID)</label>
        </div>

        <div class="textbox">
            <input type="text" id="college" required>
            <label>College</label>
        </div>

        <div class="row">
            <div class="textbox fixed-label">
            <input type="tel" id="mobile" required>
            <label>Mobile Number</label>
            </div>

            <div class="textbox">
            <input type="email" id="email" required>
            <label>Email</label>
            </div>
        </div>

        <div class="row">
            <div class="textbox">
            <input type="text" id="roll" required>
            <label>Roll Number</label>
            </div>

            <div class="textbox">
            <input type="text" id="course" required>
            <label>Course</label>
            </div>
        </div>

        <div class="row">
            <div class="textbox">
            <select id="semester" required>
                <option hidden disabled selected></option>
                <option>Semester I</option>
                <option>Semester II</option>
                <option>Semester III</option>
                <option>Semester IV</option>
                <option>Semester V</option>
                <option>Semester VI</option>
                <option>Semester VII</option>
                <option>Semester VIII</option>
            </select>
            <label>Semester</label>
            </div>

            <div class="textbox fixed-label">
            <input type="date" id="dob" >
            <label>Date of Birth</label>
            </div>
        </div>

        <div class="textbox">
            <select id="gender" required>
            <option hidden disabled selected></option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
            </select>
            <label>Gender</label>
        </div>

        <div class="textbox" id="passBox">
            <input type="password" id="password" required>
            <label>Password</label>
        </div>

        <button type="submit" id="regBtn">
            <span id="btnText">Register</span>
            <span id="loader"></span>
            <span id="checkIcon">✔</span>
        </button>
        </form>

        <p class="footer">Already have an account?
            <a href="../login/login.html">Login</a>
        </p>
    </div>

    <div id="otpSection" style="display: none;">
        <h2>Verify Email</h2>
        <h3>Enter the OTP sent to your email</h3>

        <div class="form">
            <div class="textbox">
                <input type="text" id="otpInput" maxlength="6" style="text-align: center; letter-spacing: 4px; font-weight: 600;">
                <label style="left: 50%; transform: translateX(-50%);">One Time Password</label>
            </div>

            <button type="button" id="verifyBtn">
                <span id="verifyBtnText">Verify & Login</span>
                <span id="verifyLoader" style="display:none;"></span>
            </button>
        </div>

        <p class="footer" style="margin-top: 24px;">
            Didn't receive the code? 
            <button id="resendBtn" type="button" style="background:none; border:none; color:var(--primary); cursor:pointer; font-family:inherit; font-size:inherit; padding:0; text-decoration:underline; transition: opacity 0.3s;">
                Resend
            </button>
        </p>
    </div>

    <div id="successMsg">✅ Registration Successful! Redirecting...</div>

  </div>

<script>
    window.showToast = function(message, type = 'success') {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = '';
      if(type === 'success') icon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
      if(type === 'error') icon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;

      toast.innerHTML = `${icon} <span>${message}</span>`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };

    document.querySelectorAll(".textbox input, .textbox select").forEach(field => {
        field.addEventListener("input", () => {
            field.value.trim() !== "" ? field.classList.add("filled") : field.classList.remove("filled");
        });
    });
</script>

<script src="/signup/signup.js"></script>
</body>
</html>
