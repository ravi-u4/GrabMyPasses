<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GrabMyPasses</title>
  <link rel="stylesheet" href="/login/styles.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* ========================================= */
    /* GLASS & GLOW EFFECTS                      */
    /* ========================================= */
    .login {
      background: rgba(20, 20, 35, 0.6) !important;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: absolute;
      isolation: isolate;
      overflow: hidden;
      border-radius: 20px;
      z-index: 10; /* Ensure it's above background */
    }

    .login::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: radial-gradient(
        600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
        rgba(139, 92, 246, 0.15),
        transparent 40%
      );
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .login:hover::after { opacity: 1; }
    .login:hover { border-color: rgba(139, 92, 246, 0.5); }

    /* ========================================= */
    /* TOAST STYLES                              */
    /* ========================================= */
    #toast-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999; /* Very high z-index */
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 14px;
      pointer-events: none;
      width: auto;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 50px;
      background: rgba(20, 20, 35, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      font-family: sans-serif;
      font-size: 14px;
      font-weight: 500;
      pointer-events: auto;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(20px) scale(0.9);
      animation: pop-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    
    .toast.success { border-bottom: 3px solid #10b981; }
    .toast.error { border-bottom: 3px solid #ef4444; }
    
    @keyframes pop-up { 
      0% { opacity: 0; transform: translateY(20px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body style="background-color: #0F0F1A; overflow: hidden;">

  <div style="position: fixed; inset: 0; width: 100%; height: 100%; z-index: -50; overflow: hidden;">
    <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; opacity: 0.4;">
      <source src="/assets/background.mp4" type="video/mp4">
    </video>
    <div style="position: absolute; inset: 0; background: rgba(15, 15, 26, 0.6);"></div> 
  </div>

  <img src="../assets/blob.svg" class="blob">
  <div class="orbit"></div>

  <div class="login" id="login-card">
    <a href="/">
      <img src="../assets/new-logo.png" />
    </a>
    
    <h2>Welcome back!</h2>
    <h3>Lets get you logged in!</h3>

    <form class="form">
      <div class="textbox">
        <input id="loginEmail" required type="text" placeholder=" ">
        <label>Email</label>
      </div>

      <div class="textbox">
        <input id="loginPassword" required type="password" placeholder=" ">
        <label>Password</label>
      </div>

      <button type="submit">Login</button>
    </form>

    <p class="footer">Don't have an account?
      <a href="../signup/signup.html">Register!</a>
    </p>

    <div style="margin-top: 20px; text-align: center;">
      <a href="../admin/login.html" style="color: #9ca3af; text-decoration: none; font-size: 0.85rem;">
         Are you an organizer?
      </a>
    </div>
  </div>

  <script>
    // 1. GLOBAL TOAST FUNCTION (Inlined)
    window.showToast = function(message, type = 'success') {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      // Simple SVG Icons
      let icon = '';
      if(type === 'success') icon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
      if(type === 'error') icon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;

      toast.innerHTML = `${icon} <span>${message}</span>`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };

    // 2. SPOTLIGHT EFFECT
    document.addEventListener('DOMContentLoaded', () => {
        const card = document.getElementById('login-card');
        if (card) {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        }
        if(typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
  
  <script src="/login/login.js"></script>
</body>
</html>
